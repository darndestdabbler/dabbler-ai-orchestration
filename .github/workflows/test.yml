name: Test

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  drift-guards:
    name: Tier-model drift guards
    runs-on: ubuntu-latest
    # Set 058 S3 (D6/D8): a fast, dependency-free gate that fails the build if
    # the stale "Lightweight = no Python / no venv" framing reappears in any
    # live doc, if more than one session set is in-progress at once, or if the
    # committed dist/ template bundle drifts from its canonical source. The
    # guard uses only the Python stdlib, so no install step is needed. The same
    # checks also run inside the pytest suite (ai_router/tests/test_drift_guard.py);
    # this job surfaces them as a clearly-named standalone gate.
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Run tier-model / consumer-bootstrap drift guards
        run: python ai_router/scripts/drift_guard.py

  guidance-ceiling:
    name: Preload guidance ceiling gate
    runs-on: ubuntu-latest
    # Set 085 F1: the ratcheting preload-ceiling gate. `guidance_report
    # --check` fails the build if any required-reading file is over its
    # per-file ceiling or the corpus is over its total_ceiling_tokens, so
    # the manifest in router-config.yaml is the single anti-rebloat
    # enforcement point (ceilings ratchet down only). The check reads the
    # config via config.load_config() when it can, but is fail-CLOSED: if
    # that load fails (e.g. a malformed config) it recovers the manifest
    # from a raw YAML parse and, if it still cannot confirm it, exits
    # non-zero rather than silently passing on the legacy path. The dummy
    # provider keys below keep load_config() on its happy path (env
    # validation), matching the python-tests job.
    env:
      DABBLER_ANTHROPIC_API_KEY: ci-dummy-anthropic-key
      DABBLER_GEMINI_API_KEY: ci-dummy-gemini-key
      DABBLER_OPENAI_API_KEY: ci-dummy-openai-key
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install ai_router (config loader needs pyyaml)
        run: pip install -e .

      - name: Check preload guidance ceilings
        run: python -m ai_router.guidance_report --check

  template-snapshot:
    name: Consumer-bootstrap template snapshot
    runs-on: ubuntu-latest
    # Set 058 S3 (D8): enforce the cold-start golden snapshot in CI. The full TS
    # unit suite is not run in CI (two pre-existing Set-026 specs fail under the
    # vscode-stub), so the snapshot guard would otherwise be local-only. This
    # job runs ONLY the writer-render and golden-snapshot specs directly via
    # mocha + ts-node — both pass cleanly and have no VS Code dependency — so a
    # template edit that changes rendered output without a regenerated golden
    # fails CI here.
    defaults:
      run:
        working-directory: tools/dabbler-ai-orchestration
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install extension dependencies
        run: npm ci

      - name: Run consumer-bootstrap render + cold-start golden snapshot specs
        run: >-
          npx mocha --require ts-node/register
          --require ./src/test/vscode-stub.js --ui tdd --timeout 120000
          'src/test/suite/consumerBootstrap.test.ts'
          'src/test/suite/coldStartSnapshot.test.ts'

  python-tests:
    name: Python tests
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    # load_config() validates that API-key env vars exist for every
    # enabled provider in router-config.yaml (anthropic / gemini /
    # openai). The tests don't make real provider calls — the load
    # validator just checks for env presence. Dummy values are
    # sufficient and avoid leaking real credentials through CI logs.
    env:
      DABBLER_ANTHROPIC_API_KEY: ci-dummy-anthropic-key
      DABBLER_GEMINI_API_KEY: ci-dummy-gemini-key
      DABBLER_OPENAI_API_KEY: ci-dummy-openai-key
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install ai_router with test dependencies
        run: pip install -e .[tests]

      - name: Run pytest (all marks including e2e)
        run: python -m pytest -v

  playwright-tests:
    name: Playwright Layer 3
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    # Same dummy API-key envs the python-tests job uses. Several
    # Layer-3 specs shell out to `python -m ai_router.start_session`
    # / `ai_router.new_chat_id` / `ai_router.close_session` via
    # electronLaunch.ts's harness_cli helper, and those CLIs import
    # config.load_config() at startup which validates the env is set.
    env:
      DABBLER_ANTHROPIC_API_KEY: ci-dummy-anthropic-key
      DABBLER_GEMINI_API_KEY: ci-dummy-gemini-key
      DABBLER_OPENAI_API_KEY: ci-dummy-openai-key
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # Several Layer-3 specs shell out to `python -m ai_router.*`
      # CLIs (start_session, close_session, new_chat_id) via the
      # harness_cli helper in electronLaunch.ts. The ai_router
      # package must be importable on the Playwright job's runner —
      # the separate python-tests job's install does not carry
      # across.
      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install ai_router (importable by python -m ai_router.* shell-outs)
        run: pip install -e .

      - name: Install extension dependencies
        run: npm ci
        working-directory: tools/dabbler-ai-orchestration

      - name: Install Chromium for Playwright
        run: npx playwright install chromium
        working-directory: tools/dabbler-ai-orchestration

      # src/test/playwright/electronLaunch.ts findCodeBinary() looks
      # for a VS Code binary cached under .vscode-test/ (the canonical
      # @vscode/test-electron download location). On local dev that
      # directory gets populated the first time you run `npm test`,
      # which CI does NOT invoke (the @vscode/test-electron Layer-2
      # harness is broken on Windows 11 + VS Code 1.120). Without this
      # step Layer 3 throws "No VS Code binary found and .vscode-test
      # does not exist" before any test body runs. The script just
      # downloads + extracts the binary; it does not run any tests.
      - name: Download VS Code for Playwright (populates .vscode-test/)
        run: node -e "require('@vscode/test-electron').downloadAndUnzipVSCode()"
        working-directory: tools/dabbler-ai-orchestration

      - name: Run Playwright tests (Linux with xvfb)
        if: runner.os == 'Linux'
        run: xvfb-run npm run test:playwright
        working-directory: tools/dabbler-ai-orchestration

      - name: Run Playwright tests (Windows/macOS)
        if: runner.os != 'Linux'
        run: npm run test:playwright
        working-directory: tools/dabbler-ai-orchestration

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results-${{ matrix.os }}
          path: tools/dabbler-ai-orchestration/test-results/
          retention-days: 7

  # Layer 2 (@vscode/test-electron) is skipped in CI:
  # - Known broken on Windows 11 + VS Code 1.120 (code.exe / test-electron 2.5.2 arg incompatibility)
  # - Untested on macOS/Linux (needs explicit OS-specific binary paths, xvfb on Linux)
  # See: CLAUDE.md "Orchestrator e2e harness (Set 027)" and
  #      docs/implementation-summary-023-027.md "Key Insights & Hazards"
  # Layer 2 validation is a candidate for Set 028 follow-up if upstream fixes the Windows breakage.
