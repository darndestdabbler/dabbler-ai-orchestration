<!doctype html>
<!--
  Marketplace screenshot mock — Work Explorer, module-first tree
  (Sets 091–094 four-level dialect: module → Plan / Session sets →
  status bucket → row).

  Every visual value is transcribed from the REAL webview stylesheet
  media/session-sets-tree/tree.css and the REAL renderer
  media/session-sets-tree/client.js, with VS Code Dark+ theme values
  substituted for the CSS variables:

    module-header    padding 7px 8px, 13px/600, chevron 12px, gap 4px
    child-header     padding 5px 8px 5px 24px, 12px; label 500;
                     state 11px italic opacity .7 margin-left 6px
    bucket-header    padding 6px 12px 8px 12px (+padding-left 40px under
                     a module), 11px/600 uppercase ls .05em opacity .72
    bucket label     "Label  (N)" — double space (client.js renderBucket)
    row-header       padding 2px 12px (+padding-left 40px), 13px, lh 1.2
    row-fraction     700, tabular-nums, width 3em, margin-right 12px,
                     format "N/M" (CustomSessionSetsView.fractionFor —
                     no spaces around the slash)
    fraction colors  in-progress rgb(86,180,233) · not-started
                     rgb(187,187,187) · complete rgb(0,197,140)
    selected row     background rgba(127,127,127,.10) + 2px left border
                     #007fd4 (tree.css .row[aria-selected="true"])
    spacing          module margin-bottom 6px · bucket 4px · child 1px

  The activity bar embeds the REAL product icon
  (media/dabbler-ai-orchestration-icon.svg, fill:currentColor) in the
  active slot. The other rail icons are simplified stand-ins — crop or
  overlay a screenshot of a real VS Code activity bar if you want
  pixel-perfect codicons there; the sidebar is the faithful part.

  TO CAPTURE (crisp, marketplace-ready):
    1. Open this file in a Chromium-based browser.
    2. F12 → Ctrl+Shift+M (device toolbar) → set DPR to 2 (⋮ menu →
       "Add device pixel ratio"), or just set browser zoom to 200%.
    3. Elements panel → select <div class="frame"> (or just
       <div class="sidebar"> for a rail-less crop) → right-click →
       "Capture node screenshot".
-->
<html lang="en">
<head>
<meta charset="utf-8">
<title>Work Explorer — marketplace mock</title>
<style>
  html, body {
    margin: 0; padding: 0;
    background: #000;
    font-family: "Segoe UI", -apple-system, BlinkMacSystemFont, sans-serif;
    color: #cccccc;
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh;
  }

  /* ----- Window frame: activity bar + sidebar only ----- */
  .frame {
    width: 368px;               /* 48 rail + 320 sidebar */
    height: 560px;
    display: grid;
    grid-template-columns: 48px 320px;
    background: #252526;
    box-shadow: 0 0 0 1px #444;
    overflow: hidden;
    font-size: 13px;
  }

  /* ----- Activity bar (Dark+: #333333) ----- */
  .activity-bar {
    background: #333333;
    display: flex; flex-direction: column;
    align-items: center;
  }
  .ab-icon {
    width: 48px; height: 48px;
    display: flex; align-items: center; justify-content: center;
    color: #858585;
  }
  .ab-icon.active {
    color: #ffffff;
    border-left: 2px solid #ffffff;
    margin-left: -2px;
  }
  .ab-icon svg { width: 24px; height: 24px; }
  .ab-icon svg.stroke-icon {
    fill: none; stroke: currentColor; stroke-width: 1.3;
    stroke-linecap: round; stroke-linejoin: round;
  }
  .ab-icon svg.fill-icon { fill: currentColor; }

  /* ----- Sidebar (Dark+: #252526) ----- */
  .sidebar {
    background: #252526;
    border-left: 1px solid #2b2b2b;
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  .sb-title {
    flex-shrink: 0;
    padding: 10px 16px 8px 20px;
    text-transform: uppercase;
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 0.08em;
    color: #bbbbbb;
    display: flex; align-items: center; justify-content: space-between;
  }
  .sb-title .actions { font-size: 15px; opacity: 0.7; letter-spacing: 0; }

  .tree { display: flex; flex-direction: column; padding: 2px 0; }

  /* ----- Module tier (tree.css .module*) ----- */
  .module { margin-bottom: 6px; }
  .module-header {
    display: flex; align-items: center; gap: 4px;
    padding: 7px 8px;
    font-size: 13px; font-weight: 600;
    color: #cccccc;
    user-select: none;
  }
  .module-chevron {
    display: inline-block; width: 12px; text-align: center;
    opacity: 0.7; flex-shrink: 0;
    font-size: 11px;
  }

  /* ----- Level-2 children: Plan / Session sets (tree.css .child-*) ----- */
  .module-child { margin-bottom: 1px; }
  .child-header {
    display: flex; align-items: center; gap: 4px;
    padding: 5px 8px 5px 24px;
    font-size: 12px;
    user-select: none;
  }
  .child-chevron {
    display: inline-block; width: 12px; text-align: center;
    opacity: 0.7; flex-shrink: 0;
    font-size: 10px;
  }
  .child-label { font-weight: 500; }
  .child-state {
    margin-left: 6px;
    font-size: 11px;
    opacity: 0.7;
    font-style: italic;
    color: #8a8a8a;
  }

  /* ----- Buckets (tree.css .bucket*) ----- */
  .bucket { margin-bottom: 4px; }
  .bucket-header {
    display: flex; align-items: center; gap: 4px;
    padding: 6px 12px 8px 40px;
    font-size: 11px; font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    opacity: 0.72;
    user-select: none;
  }
  .bucket-chevron {
    display: inline-block; width: 12px; text-align: center;
    opacity: 0.7; flex-shrink: 0;
    font-size: 9px;
  }

  /* ----- Rows (tree.css .row*) ----- */
  .row {
    display: block;
    border-left: 2px solid transparent;
  }
  .row.selected {
    background: rgba(127, 127, 127, 0.10);
    border-left-color: #007fd4;
  }
  .row-header {
    display: flex; align-items: baseline;
    padding: 2px 12px 2px 40px;
    font-size: 13px; line-height: 1.2;
    user-select: none;
  }
  .row.selected .row-header { padding-left: 38px; }
  .row-fraction {
    flex: 0 0 auto;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    font-feature-settings: "tnum";
    text-align: right;
    width: 3em;
    margin-right: 12px;
    line-height: 1.2;
  }
  .row-fraction-in-progress { color: rgb(86, 180, 233); }
  .row-fraction-not-started { color: rgb(187, 187, 187); }
  .row-fraction-complete    { color: rgb(0, 197, 140); }
  .row-text { flex: 1 1 auto; min-width: 0; }
  .row-name {
    font-weight: 500;
    white-space: normal; word-break: break-word;
  }
</style>
</head>
<body>

-0.6439 -1.6903,-0.6439 z"/>
        </svg>
      </div>
    </div>

    <!-- Sidebar / Work Explorer -->
    <div class="sidebar">
      <div class="sb-title">Work Explorer <span class="actions">⋯</span></div>
      <div class="tree">

        <!-- Module 1: expanded -->
        <div class="module">
          <div class="module-header">
            <span class="module-chevron">▾</span>
            <span class="module-title">Auth Service</span>
          </div>
          <div class="module-body">

            <div class="module-child">
              <div class="child-header">
                <span class="child-chevron"></span>
                <span class="child-label">Plan</span>
                <span class="child-state">present</span>
              </div>
            </div>

            <div class="module-child">
              <div class="child-header">
                <span class="child-chevron">▾</span>
                <span class="child-label">Session sets</span>
              </div>
              <div class="child-body">

                <div class="bucket">
                  <div class="bucket-header">
                    <span class="bucket-chevron">▾</span>
                    <span>In Progress&nbsp;&nbsp;(1)</span>
                  </div>
                  <div class="row selected">
                    <div class="row-header">
                      <span class="row-fraction row-fraction-in-progress">2/4</span>
                      <span class="row-text"><span class="row-name">012-passkey-enrollment</span></span>
                    </div>
                  </div>
                </div>

                <div class="bucket">
                  <div class="bucket-header">
                    <span class="bucket-chevron">▾</span>
                    <span>Not Started&nbsp;&nbsp;(1)</span>
                  </div>
                  <div class="row">
                    <div class="row-header">
                      <span class="row-fraction row-fraction-not-started">0/3</span>
                      <span class="row-text"><span class="row-name">013-session-token-rotation</span></span>
                    </div>
                  </div>
                </div>

                <div class="bucket">
                  <div class="bucket-header">
                    <span class="bucket-chevron">▾</span>
                    <span>Complete&nbsp;&nbsp;(2)</span>
                  </div>
                  <div class="row">
                    <div class="row-header">
                      <span class="row-fraction row-fraction-complete">5/5</span>
                      <span class="row-text"><span class="row-name">010-oauth-provider-integration</span></span>
                    </div>
                  </div>
                  <div class="row">
                    <div class="row-header">
                      <span class="row-fraction row-fraction-complete">3/3</span>
                      <span class="row-text"><span class="row-name">011-password-reset-flow</span></span>

        </div>

        <!-- Modules 2–4: collapsed -->
        <div class="module">
          <div class="module-header">
            <span class="module-chevron">▸</span>
            <span class="module-title">Billing</span>

        <div class="module">

</body>
</html>
