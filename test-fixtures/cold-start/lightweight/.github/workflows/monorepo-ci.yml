# .github/workflows/monorepo-ci.yml — monorepo CI for module-organized
# projects (Dabbler). Scaffolded by the Dabbler AI Orchestration extension.
#
# The two-layer contract (keep it in sync with docs/modules.yaml):
#
#   1. PATH-SCOPED MODULE JOBS — fast feedback: each module's job runs only
#      when its `codeRoots` change (the `changes` detection job below).
#   2. THE ALL-MODULE GUARDRAIL — every merge to `main` builds and tests
#      EVERY module, unconditionally. This is the anti-integration-bomb
#      rule: cross-module breakage surfaces on the merge that caused it,
#      not weeks later when the victim module next changes.
#
# HOW TO ADAPT: replace the `echo` placeholder in `all-modules` with your
# real build/test commands, then uncomment the `changes` + per-module jobs
# and point each filter at that module's `codeRoots` from docs/modules.yaml.
# The scaffolded file is deliberately harmless as-is (the placeholder step
# succeeds), so committing it before adapting cannot break your builds.

