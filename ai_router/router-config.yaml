# ============================================================
# AI Router Configuration
# ============================================================
# All model info, pricing, thresholds, and behavior in one file.
# API keys are NEVER stored here — use environment variables.
#
# This YAML is the single source of truth for every tunable knob.
# The former router-tuning.json overlay was removed in Session 2 of
# BATON v2. If you need to change a value, change it here.
# ============================================================

# --- Metadata ---
# pricing_reviewed:      ISO date — last time a human verified the
#                         input/output costs below against provider
#                         pricing pages.
# review_frequency_days: Soft threshold. If the YAML is older than
#                         this, config.py prints a warning at load
#                         time (does not block execution).
metadata:
  pricing_reviewed: "2026-07-03"
  review_frequency_days: 30

# --- Provider Configuration ---
providers:
  anthropic:
    display_label: Anthropic
    enabled: true
    api_key_env: DABBLER_ANTHROPIC_API_KEY
    base_url: https://api.anthropic.com/v1/messages
    api_version: "2023-06-01"
    rate_limit:
      requests_per_minute: 50
      tokens_per_minute: 80000
    timeout_seconds: 600
    retry:
      max_retries: 2
      backoff_base_seconds: 2  # exponential: 2s, 4s

  google:
    display_label: Google
    enabled: true
    api_key_env: DABBLER_GEMINI_API_KEY
    base_url: https://generativelanguage.googleapis.com/v1beta
    rate_limit:
      requests_per_minute: 60
      tokens_per_minute: 100000
    timeout_seconds: 300
    retry:
      max_retries: 2
      backoff_base_seconds: 2

  openai:
    display_label: OpenAI
    enabled: true
    api_key_env: DABBLER_OPENAI_API_KEY
    base_url: https://api.openai.com/v1
    rate_limit:
      requests_per_minute: 60
      tokens_per_minute: 100000
    timeout_seconds: 300
    retry:
      max_retries: 2
      backoff_base_seconds: 2

# --- Transport profile (Set 078) ---
# Selects HOW every routed call is dispatched, independent of WHICH model is
# picked. "api" (default) is the existing direct-HTTPS path above — fully
# unchanged. "copilot-cli" dispatches through the GitHub Copilot CLI's
# headless mode instead (ai_router/cli_transport.py), for shops whose staff
# hold only a Copilot seat and no provider API keys. See
# docs/concepts/tier-model.md and
# docs/session-sets/078-copilot-cli-hybrid-tier/spec.md for the full
# seat-profile contract and its explicitly degraded guarantees (asserted
# provider provenance, no billed-usage accounting).
transport:
  profile: api   # api | copilot-cli

# The copilot-cli profile's own settings. Only read/validated when
# transport.profile == copilot-cli; otherwise inert. Roles are late-bound
# aliases resolved against the seat-local catalog lockfile at
# transports.copilot-cli.lockfile — the same role config resolves to
# different concrete models on different seats (the lock is model-truth;
# this config is intent). See s1-design-adjudication.md Sections 1-2 for the
# resolution algorithm and the lockfile schema.
transports:
  copilot-cli:
    kind: cli_subprocess
    binary: copilot
    lockfile: ai_router/copilot-catalog.lock
    require_pinned_version: true       # asserts --no-auto-update on every call
    billed_usage_unavailable: true      # honest non-accounting; see guard-exclusion list below
    max_invocations_per_session: 200    # hard circuit breaker, not a budget (design lock Section 5)
    # Set 086 S2: togglable transport diagnostics. When enabled, every FAILED
    # copilot-cli dispatch on the route()/verify() path appends one structured
    # record (error_class, exit_code, argv with the -p prompt redacted,
    # auth-reprobe result, stderr tail) to log_path, so a dispatch failure is
    # never swallowed. Default off (no file writes). The env var
    # DABBLER_COPILOT_DIAGNOSTICS (truthy/falsy) overrides this both ways;
    # DABBLER_COPILOT_DIAGNOSTICS_LOG overrides log_path. A compact one-line
    # summary is embedded in the raised error regardless of this toggle.
    diagnostics:
      enabled: false
      log_path: ai_router/copilot-transport-diagnostics.jsonl
    roles:
      generator:
        prefer: [claude-sonnet-4.6, gpt-5.5, gemini-3.1-pro-preview]
        require_provider_in: [anthropic, openai, google]
      verifier:
        prefer: [gpt-5.4, gemini-3.1-pro-preview, claude-sonnet-4.6]
        require_provider_in: [anthropic, openai, google]
    constraints:
      cross_role_provider_diversity:
        distinct_provider: [generator, verifier]   # verifier family MUST differ from generator
        on_violation: fail_closed

# --- Model Registry ---
# Each model has a tier (1=cheap/fast, 2=balanced, 3=powerful/expensive),
# pricing, context limits, and a reference to its prompt template.
#
# Two eligibility flags control where a model can be used:
#   is_enabled               — included in the generator pool at all.
#                              Default: true (omit to accept default).
#   is_enabled_as_verifier   — trusted to verify other models' output.
#                              Default: true. Set to false when adding
#                              a new model so it can be evaluated as a
#                              generator first; promote by flipping to
#                              true once calibration data supports it.
# The two flags exist so adding a cheap new model does not silently
# enroll it in verifier duty. See docs/planning/project-guidance.md
# (workflow-expectations) for the promotion criterion.
models:
  gemini-flash:
    provider: google
    model_id: gemini-2.5-flash
    tier: 1
    is_enabled: true
    is_enabled_as_verifier: true
    input_cost_per_1m: 0.30
    output_cost_per_1m: 2.50
    max_context_tokens: 1048576
    max_output_tokens: 65536
    system_prompt_file: prompt-templates/system-prompts.md
    notes: "Best for simple analysis, formatting, boilerplate generation"
    # Default API parameters sent with every call. Can be overridden
    # per-task-type under task_type_params below.
    # For Gemini 2.5 models: thinking_budget is an integer cap on
    # thinking tokens. -1 = dynamic, 0 = off, positive = hard cap.
    # For Gemini 3.x models: use thinking_level (MINIMAL|LOW|MEDIUM|HIGH).
    generation_params:
      thinking_budget: 0          # Flash tier: thinking off by default

  gemini-pro:
    provider: google
    model_id: gemini-2.5-pro
    tier: 2
    is_enabled: true
    is_enabled_as_verifier: true
    input_cost_per_1m: 1.25
    output_cost_per_1m: 10.00
    max_context_tokens: 1048576
    max_output_tokens: 65536
    system_prompt_file: prompt-templates/system-prompts.md
    notes: "Good for medium-complexity analysis, documentation, code review"
    generation_params:
      thinking_budget: -1         # dynamic; Gemini picks how deep to think

  gemini-3-1-pro:
    provider: google
    model_id: gemini-3.1-pro-preview
    tier: 2
    is_enabled: true
    is_enabled_as_verifier: false   # new model: generator + explicit-call only until calibrated (registry convention, lines 120-130); promote later
    input_cost_per_1m: 1.25
    output_cost_per_1m: 10.00
    max_context_tokens: 1048576
    max_output_tokens: 65536
    system_prompt_file: prompt-templates/system-prompts.md
    notes: "Frontier Google Pro (preview id gemini-3.1-pro-preview).
      Cross-provider verifier + consensus engine. PLACEHOLDER pricing/limits
      mirror gemini-2.5-pro — confirm against Google's published 3.1 Pro rates
      before trusting cost reports; the preview model_id may change at GA."
    # Gemini 3.x uses thinking_level (MINIMAL|LOW|MEDIUM|HIGH), not the
    # 2.5-era integer thinking_budget.
    generation_params:
      thinking_level: HIGH

  sonnet:
    provider: anthropic
    model_id: claude-sonnet-4-6
    tier: 2
    is_enabled: true
    is_enabled_as_verifier: true
    input_cost_per_1m: 3.00
    output_cost_per_1m: 15.00
    max_context_tokens: 200000
    max_output_tokens: 16000
    system_prompt_file: prompt-templates/system-prompts.md
    notes: "Use when Anthropic quality needed but Opus overkill"
    # Sonnet 4.6 defaults to effort=high internally if effort is unset,
    # which burns tokens on every call. Explicitly setting effort here
    # avoids that. Adaptive thinking is opt-in; when disabled, the model
    # responds without thinking blocks (fastest, cheapest).
    generation_params:
      effort: medium              # low|medium|high|xhigh
      thinking:
        enabled: false            # set true to send thinking:{type:adaptive}
        type: adaptive

  opus:
    provider: anthropic
    model_id: claude-opus-4-8
    tier: 3
    is_enabled: true
    is_enabled_as_verifier: true
    input_cost_per_1m: 5.00
    output_cost_per_1m: 25.00
    max_context_tokens: 200000
    max_output_tokens: 32000
    system_prompt_file: prompt-templates/system-prompts.md
    notes: "Reserved for complex architectural reasoning"
    # Opus is only invoked for tier-3 tasks (architecture, security review,
    # session verification). Adaptive thinking is on by default because
    # those tasks benefit from deep reasoning. Override per task type below
    # if a specific tier-3 task should skip thinking.
    generation_params:
      effort: high                # architecture-class work gets high effort
      thinking:
        enabled: true
        type: adaptive
    # NOTE: model_id is claude-opus-4-8 (latest Opus). Opus 4.8 supports
    # task_budget (beta) — a token budget that spans the full agentic
    # loop. If you raise the per-call ceiling, bump max_output_tokens
    # toward 64000; left at 32000 here for cost control on tier-3 calls.

  # --- OpenAI GPT-5.x family -----------------------------------------------
  # Added as verification models initially. Used by the cross-provider map
  # to independently review work from Anthropic and Google models. Once you
  # have data on how well they verify, consider promoting them to generator
  # slots in tier_assignments.
  gpt-5-4:
    provider: openai
    model_id: gpt-5.4
    tier: 3
    is_enabled: true
    is_enabled_as_verifier: true
    input_cost_per_1m: 2.50
    output_cost_per_1m: 15.00
    max_context_tokens: 272000
    max_output_tokens: 32000
    system_prompt_file: prompt-templates/system-prompts.md
    notes: "Frontier OpenAI model. Used to verify Opus output (cross-provider)
      and as a cheaper frontier alternative for session verification of
      implementation-heavy work. Opus-class quality at ~60% of Opus cost."
    generation_params:
      reasoning_effort: high
    # NOTE: Prompts over 272K input tokens trigger 2x input + 1.5x output
    # pricing for the full session. The router caps input at 80% of
    # max_context_tokens, which keeps you under that ceiling by default.

  gpt-5-5:
    provider: openai
    model_id: gpt-5.5
    tier: 3
    is_enabled: true
    is_enabled_as_verifier: true    # Set 090 follow-up: PROMOTED to verifier (repinned session-verification below) to cut gpt-5-4's false positives on small meta-work sets. Deliberately overrides the calibrate-as-generator-first convention, on the operator's call. (Newer sibling frontier model: gpt-5-6 "Sol".)
    input_cost_per_1m: 2.50
    output_cost_per_1m: 15.00
    max_context_tokens: 272000
    max_output_tokens: 32000
    system_prompt_file: prompt-templates/system-prompts.md
    notes: "Frontier OpenAI model (GPT-5.5). Cross-provider verifier +
      consensus engine. PLACEHOLDER pricing/limits mirror gpt-5.4 — confirm
      against OpenAI's published GPT-5.5 rates before trusting cost reports."
    generation_params:
      reasoning_effort: high

  gpt-5-6:
    provider: openai
    model_id: gpt-5.6
    tier: 3
    is_enabled: true
    is_enabled_as_verifier: true    # PINNED as the session-verification verifier (operator, 2026-07-10) — the newest frontier model, to minimize the false-positive Majors gpt-5-4 produced on small meta-work sets. model_id PROBED live.
    input_cost_per_1m: 2.50
    output_cost_per_1m: 15.00
    max_context_tokens: 272000
    max_output_tokens: 32000
    system_prompt_file: prompt-templates/system-prompts.md
    notes: "Frontier OpenAI model GPT-5.6, codename 'Sol' (operator, 2026-07-10).
      PLACEHOLDER pricing/limits mirror gpt-5.4/5.5 — confirm against OpenAI's
      published GPT-5.6 rates and the exact model_id before trusting."
    generation_params:
      reasoning_effort: high

  gpt-5-4-mini:
    provider: openai
    model_id: gpt-5.4-mini
    tier: 2
    is_enabled: true
    is_enabled_as_verifier: true
    input_cost_per_1m: 0.75
    output_cost_per_1m: 4.50
    max_context_tokens: 400000
    max_output_tokens: 16000
    system_prompt_file: prompt-templates/system-prompts.md
    notes: "Small OpenAI model. Used to verify Gemini Pro output
      (cross-provider). Cheaper than Sonnet ($3/$15) and Claude Haiku
      ($1/$5) with a larger context window."
    generation_params:
      reasoning_effort: medium

  # --- Identity-registry-only entries (Set 084 F1) --------------------------
  # Orchestrator models that are NOT part of the routed generator/verifier
  # pool but must resolve in the identity registry so start_session can
  # validate them and the close gate / verifier exclusion can derive their
  # effective provider (orchestrator_identity.resolve_model_provider walks
  # models: keys and model_ids). is_enabled: false keeps them out of every
  # selection path — pick_model, verifier selection, and escalation all
  # skip disabled entries. Add a sibling entry here whenever a new
  # orchestrator model appears that neither the routed pool nor the Copilot
  # CLI's documented model universe covers.
  claude-sonnet-5:
    provider: anthropic
    model_id: claude-sonnet-5
    is_enabled: false
    is_enabled_as_verifier: false
    notes: "Identity registry only: Claude Code orchestrator sessions."
  gemini-3-pro:
    provider: google
    model_id: gemini-3-pro
    is_enabled: false
    is_enabled_as_verifier: false
    notes: "Identity registry only: Gemini Code Assist orchestrator
      sessions (the Set 084 S2 ai-assignment recommendation)."

# --- Routing Thresholds ---
# Complexity score 1-100 mapped to tiers.
routing:
  # outsourcing_mode: controls when cross-provider calls are made.
  # whenever-helpful (default) | verification-only | disabled
  outsourcing_mode: whenever-helpful
  tier1_max_complexity: 30    # score ≤ 30 → tier 1 (Flash)
  tier2_max_complexity: 65    # score 31–65 → tier 2 (Pro or Sonnet)
  default_tier: 2             # fallback when estimation is uncertain

  # Which model to use for each tier
  tier_assignments:
    1: gemini-flash
    2: gemini-pro
    3: opus

  # Override: force a specific model for specific task types
  task_type_overrides:
    # Force Sonnet for code review -- Anthropic models are stronger at
    # careful line-by-line reasoning and catching subtle issues.
    code-review: sonnet
    # Force Opus for architecture. Short architecture prompts can score
    # below the Tier-3 threshold and route to Tier 2 (gemini-pro), which
    # produced a 100% verifier rejection rate in early metrics — the
    # task type is always high-stakes regardless of prompt length.
    architecture: opus
    # UAT checklist generation and its coverage audit are high-stakes
    # governance gates; route them straight to Tier 3 rather than relying
    # on heuristic scoring to land there indirectly.
    uat-plan-generation: opus
    uat-coverage-review: opus
    # End-of-session cross-provider verification. Set 084 (F2): this
    # pin is a PREFERENCE ONLY — it can never override the dynamic
    # orchestrator exclusion. route(task_type="session-verification")
    # with session context resolves the session orchestrator's
    # EFFECTIVE provider (registry lookup on the orchestrator block's
    # model, via ai_router/orchestrator_identity.py) and excludes it
    # from selection as a hard constraint; when this pinned model's
    # provider is excluded, selection falls through to the cheapest
    # surviving same-tier model from another provider, and an exclusion
    # that leaves NO candidate is the explicit verification_unavailable
    # outcome (never a silent same-provider verification). The pre-084
    # hand-tuned static pin ("swap this value if a different
    # orchestrator runs sessions") was the incident-3 hole: it
    # dispatched a Copilot-seat verification to the orchestrator's own
    # underlying model. Set 090 follow-up: the preferred verifier is now
    # gpt-5-6 "Sol" (was gpt-5-4, briefly gpt-5-5) — gpt-5-4 produced repeated
    # false-positive Major findings on small meta-work sets (Sets 088/089/090),
    # so the newest frontier model is pinned to reduce them. Still a PREFERENCE
    # ONLY; the dynamic orchestrator exclusion is unchanged, so on a Claude-
    # orchestrator session gpt-5-6 (openai) survives the anthropic exclusion
    # and is used.
    session-verification: gpt-5-6
    # Fresh close-out turn. The orchestrator routes a new turn with
    # task_type=session-close-out after disposition.json reports
    # status=completed AND verification has terminated. The work is
    # mechanical: read close-out.md, run `python -m
    # ai_router.close_session`, summarize the outcome. Sonnet at low
    # effort is the cheapest model that reliably reads a doc and runs
    # a script — Tier-1 (Flash) lacks tool-use discipline for the
    # close-out gate's structured output, and Tier-3 is overkill for
    # what is essentially a CLI invocation. Auto-verification is
    # intentionally NOT enabled for this task type — close-out either
    # succeeds (the gate passed) or the gate's own structured failure
    # is the verdict; a separate verifier round adds cost without
    # improving reliability.
    session-close-out: sonnet
    # Set 030 Session 1: spec-title-extraction is the AI-fallback path
    # the Session 5 in-extension migrator and the bulk migrator use
    # when ``### Session K of N: <title>`` regex extraction fails on a
    # malformed spec.md. The task is mechanical: read spec.md, emit a
    # JSON array of {number, title} records. Pinned to gemini-flash
    # because Flash is the cheapest structured-JSON producer in the
    # pool and short-extract latency matters more than depth here.
    # NOT auto-routed (operator-driven only — see absence from
    # delegation.always_route_task_types) and NOT auto-verified
    # (structured output is its own verdict; a second-opinion round
    # would burn budget without buying reliability).
    spec-title-extraction: gemini-flash

# --- Delegation ---
# Guidance for orchestrators (Claude Code / Codex / Gemini) on which
# task types must always go through route() rather than being handled
# directly. The orchestrator reads this list at session start.
delegation:
  always_route_task_types:
    - code-review
    - security-review
    - architecture
    - planning
    - uat-plan-generation
    - uat-coverage-review
    - analysis
    - session-verification
    - documentation
    - test-generation
    - session-close-out

  # decision_consensus: opt-in cross-engine consult for in-session design /
  # architecture / process decisions. When enabled, the orchestrator routes
  # an eligible question to the listed engines in parallel and synthesizes
  # their responses into a single recommendation BEFORE falling back to
  # AskUserQuestion. Default is opt-out (enabled: false) — every existing
  # repo's behavior is unchanged until the operator explicitly flips it on.
  # See docs/ai-led-session-workflow.md "Decision-time consensus" for the
  # decision tree, eligible/human-only category examples, and the journal
  # format. Design proposal: docs/planning/delegation-consensus-config.md.
  decision_consensus:
    enabled: false
    # Engines the orchestrator consults in parallel. Each entry is a
    # "provider:model" reference that must resolve against the
    # models: table above. Independent of verification.preferred_pairings
    # — verify and consult are different roles and may want different
    # pairings.
    engines:
      - openai:gpt-5-4
      - google:gemini-pro
    # V1 starts narrow: the four highest-convergence "mechanical" question
    # categories where engines reliably agree. Broader categories
    # (testing-strategy, api-surface, design, architecture) are V1.5+;
    # operators can opt in any category at any time by editing this list.
    categories:
      - refactor-placement
      - file-layout
      - scoping
      - spec-clarification
    # What the orchestrator does when the engines disagree materially or
    # the synthesis hinges on information neither engine has.
    #   ask_user: surface the synthesized conflict via AskUserQuestion (safe default)
    #   proceed_with_orchestrator_judgment: orchestrator picks a side (power-user)
    unresolved_action: ask_user
    # Per-call structured log line (append-only JSONL, one object per call).
    # Mirrors router-metrics.jsonl precedent. Set to null to disable.
    journal_path: ai_router/consensus-decisions.jsonl
    # Full-payload sibling directory (one file per call: prompt + per-engine
    # responses + synthesized recommendation). Set to null to disable.
    # The directory is gitignored by default — see repo-root .gitignore.
    journal_full_payloads_dir: ai_router/consensus-decisions

# --- Per-Task-Type Generation Parameter Overrides ---
# Structure: task_type_params.<task_type>.<model_name> = {params to override}
# These override the model-level generation_params above. Missing entries
# fall back to model defaults.
task_type_params:
  # Cheap, mechanical tasks: no thinking, low effort.
  formatting:
    sonnet:     { effort: low, thinking: { enabled: false } }
    opus:       { effort: low, thinking: { enabled: false } }
    gemini-flash: { thinking_budget: 0 }
    gemini-pro: { thinking_budget: 0 }
    gpt-5-4-mini: { reasoning_effort: none }
    gpt-5-4:    { reasoning_effort: none }
  summarization:
    sonnet:     { effort: low, thinking: { enabled: false } }
    opus:       { effort: low, thinking: { enabled: false } }
    gemini-flash: { thinking_budget: 0 }
    gemini-pro: { thinking_budget: 0 }
    gpt-5-4-mini: { reasoning_effort: none }
    gpt-5-4:    { reasoning_effort: low }
  documentation:
    sonnet:     { effort: low, thinking: { enabled: false } }
    gemini-pro: { thinking_budget: -1 }
    gpt-5-4-mini: { reasoning_effort: low }
  # Close-out turn. The work is reading a doc and running a CLI;
  # thinking is unhelpful and just burns tokens.
  session-close-out:
    sonnet:     { effort: low, thinking: { enabled: false } }
    gemini-pro: { thinking_budget: 0 }
    gpt-5-4-mini: { reasoning_effort: none }
  # Set 030 Session 1: spec-title-extraction is a short structured
  # extract; thinking off everywhere for speed + cost. Defaults are
  # provided for every model in the pool so a tier-bump or override
  # never lands on an un-tuned config.
  spec-title-extraction:
    gemini-flash: { thinking_budget: 0 }
    gemini-pro:   { thinking_budget: 0 }
    sonnet:       { effort: low, thinking: { enabled: false } }
    opus:         { effort: low, thinking: { enabled: false } }
    gpt-5-4-mini: { reasoning_effort: none }
    gpt-5-4:      { reasoning_effort: none }

  # Medium tasks: adaptive thinking, medium effort.
  test-generation:
    sonnet:     { effort: medium, thinking: { enabled: true, type: adaptive } }
    gemini-pro: { thinking_budget: -1 }
    gpt-5-4-mini: { reasoning_effort: medium }
  code-review:
    sonnet:     { effort: medium, thinking: { enabled: true, type: adaptive } }
    gemini-pro: { thinking_budget: -1 }
    gpt-5-4-mini: { reasoning_effort: medium }
  analysis:
    sonnet:     { effort: medium, thinking: { enabled: true, type: adaptive } }
    gemini-pro: { thinking_budget: -1 }
    gpt-5-4-mini: { reasoning_effort: medium }
  refactoring:
    sonnet:     { effort: medium, thinking: { enabled: true, type: adaptive } }
    gemini-pro: { thinking_budget: -1 }
    gpt-5-4-mini: { reasoning_effort: medium }

  # Heavy tasks: high effort, deep thinking. These are the places
  # where you actually want the model to spend tokens.
  session-verification:
    sonnet:     { effort: high, thinking: { enabled: true, type: adaptive } }
    opus:       { effort: high, thinking: { enabled: true, type: adaptive } }
    gemini-pro: { thinking_budget: -1 }
    gpt-5-4:    { reasoning_effort: high }
    gpt-5-4-mini: { reasoning_effort: high }
  security-review:
    sonnet:     { effort: high, thinking: { enabled: true, type: adaptive } }
    opus:       { effort: high, thinking: { enabled: true, type: adaptive } }
    gemini-pro: { thinking_budget: -1 }
    gpt-5-4:    { reasoning_effort: high }
  architecture:
    opus:       { effort: max, thinking: { enabled: true, type: adaptive } }
    gemini-pro: { thinking_budget: -1 }
    gpt-5-4:    { reasoning_effort: xhigh }
  planning:
    opus:       { effort: high, thinking: { enabled: true, type: adaptive } }
    gemini-pro: { thinking_budget: -1 }
    gpt-5-4:    { reasoning_effort: high }
  uat-plan-generation:
    opus:       { effort: high, thinking: { enabled: true, type: adaptive } }
    gemini-pro: { thinking_budget: -1 }
    gpt-5-4:    { reasoning_effort: high }
  uat-coverage-review:
    opus:       { effort: high, thinking: { enabled: true, type: adaptive } }
    gemini-pro: { thinking_budget: -1 }
    gpt-5-4:    { reasoning_effort: high }

  # Verification task type used by the internal verify() path. Kept
  # separate from 'session-verification' so per-task-type overrides
  # won't bleed across them. Default is medium reasoning for the verifier.
  verification:
    sonnet:     { effort: medium, thinking: { enabled: true, type: adaptive } }
    opus:       { effort: high, thinking: { enabled: true, type: adaptive } }
    gemini-pro: { thinking_budget: -1 }
    gpt-5-4:    { reasoning_effort: high }
    gpt-5-4-mini: { reasoning_effort: medium }

# --- Complexity Estimation Weights ---
# These weights control how the complexity score is calculated.
# Adjust based on observed results.
#
# DELIBERATE NON-GOAL: Do not invest further engineering in tightening
# this heuristic (e.g., embeddings, ML-based complexity prediction).
# The current heuristic + 2-try escalation safety net is the intended
# stopping point. If the score misjudges a task, escalation catches it
# and the metrics log shows the pattern. Spending effort to save a few
# pennies on retried calls is a false economy. This decision is
# ratified in docs/planning/lessons-learned.md under "Heuristics that
# earn their keep".
complexity:
  weights:
    context_length: 0.30      # longer prompts = more complex
    keyword_signals: 0.35     # content-based signals
    task_type: 0.20           # some task types are inherently harder
    explicit_hint: 0.15       # caller can provide a hint (1-100)

  # Context length breakpoints → sub-scores
  context_length_scores:
    - { max_chars: 500, score: 10 }
    - { max_chars: 2000, score: 25 }
    - { max_chars: 5000, score: 45 }
    - { max_chars: 10000, score: 65 }
    - { max_chars: 999999, score: 85 }

  # Task type base scores
  task_type_scores:
    code-review: 40
    documentation: 25
    analysis: 55
    test-generation: 35
    planning: 70
    uat-plan-generation: 70
    uat-coverage-review: 70
    formatting: 10
    summarization: 20
    architecture: 80
    security-review: 75
    refactoring: 65
    session-verification: 70
    session-close-out: 15        # mechanical: read doc + run CLI
    spec-title-extraction: 20    # short structured-JSON extract from spec.md
    general: 50

  # Keywords that push complexity up (+3 each, capped at +15)
  high_complexity_keywords:
    - architect
    - security
    - performance
    - concurrency
    - migration
    - breaking change
    - cross-cutting
    - distributed
    - race condition
    - backward compatible
    - critical
    - complex
    - authentication
    - authorization
    - permission
    - injection
    - XSS
    - CSRF
    - token
    - encryption

  # Keywords that push complexity down (-3 each, capped at -15)
  low_complexity_keywords:
    - rename
    - typo
    - format
    - lint
    - boilerplate
    - simple
    - straightforward
    - placeholder
    - stub
    - comment
    - log
    - copy

# --- Escalation ---
escalation:
  enabled: true
  max_escalations: 2          # tier 1 → 2 → 3, then give up
  triggers:
    empty_response: true
    max_tokens_hit: true       # response truncated
    min_output_tokens: 30      # suspiciously short response
    refusal_detection: true    # model declined the task
  refusal_phrases:
    - "i can't help with"
    - "i'm unable to"
    - "i cannot assist"
    - "beyond my capabilities"
    - "i don't have enough context"

# --- Verification (IV&V) ---
# Cross-provider verification: a model from a different provider
# checks the work of the original model to catch provider-specific
# blind spots and biases.
#
# Verification-surface policy (Set 083 — MANDATORY, reversing the Set 068
# DEMOTE): per-session cross-provider verification runs on EVERY Full-tier
# session before close_session. The Set 068 routed-gate SKIP path is retired
# (operator decision after the 2026-07-06 UAT incident: the gating predicate's
# verdict was only as honest as the path list the policed actor fed it, and an
# engine offered a skip affordance will eventually take it). The end-of-set
# path-aware critique + the S5 contract-test gate remain as additional
# surfaces, not replacements. The only exception is the operator-declared
# zero-budget tier (ai_router/budget.yaml, threshold_usd: 0) — never an
# engine's own call. Historical record of the demote-and-reversal:
# docs/session-sets/068-cadence-study-and-contract-gate/routed-fate-decision.md;
# policy: docs/ai-led-session-workflow.md -> "Verification-surface policy".
verification:
  enabled: true

  # --- Phased verification loop (Set 096) ---
  # Sizes verify_session's --phase machinery. Values are the Set 096 S1
  # fan-out experiment's measured recommendation
  # (docs/session-sets/096-consequence-graded-phased-verification/
  # s1-fanout-experiment.md): same-model pairwise finding overlap on a
  # frozen artifact state measured Jaccard 0.13-0.31, so K=2 identical-
  # bundle discovery calls harvest ~81% (mean) of the observable finding
  # pool vs ~50% for one call; the third call added one finding (+$0.25)
  # and the cross-provider call added zero, so provider diversity is a
  # PREFERENCE knob for the supplementary pass, not a hard rule. Both
  # values are operator-tunable; verify_session clamps fan_out to [1, 4]
  # and falls back to these defaults on a malformed value.
  discovery:
    fan_out: 2                       # K same-model discovery calls, identical bundles
    provider_diversity: same-model   # same-model | cross-provider
                                     # same-model: the supplementary pass decorrelates by
                                     #   prompt (completeness-critic framing) on the same
                                     #   verifier pool -- the measured-better harvest.
                                     # cross-provider: the supplementary pass ALSO excludes
                                     #   the round-1 verifier's provider, preferring a third
                                     #   family when one exists (degrades loudly to the base
                                     #   orchestrator-only exclusion when none survives).

  # --- Per-session routed-verification gate (Set 068 S6) — RETIRED (Set 083)
  # The routed_gate CLI is kept only so pre-083 scaffolds keep working; it now
  # always answers REQUIRED (exit 0) and its predicate is informational. The
  # knobs below document the historical defaults; they no longer gate anything.
  routed_gate:
    enabled: true
    breadth_threshold: 4        # informational only since the Set 083 retirement

  # Verifier selection is RULE-BASED, not map-based. A candidate
  # verifier must be:
  #   1. From a different provider than the generator.
  #   2. is_enabled (in the active model pool).
  #   3. is_enabled_as_verifier (trusted to verify, not just to generate).
  #   4. Same tier as the generator, or one tier higher.
  # Among survivors, cheapest output cost wins.
  #
  # preferred_pairings below is an OPTIONAL tiebreaker layer — if the
  # listed pairing survives the rules, it is used; otherwise the rules
  # decide. This means a model can be swapped or retired by editing the
  # models: section alone, without hunting through a pairing table.
  #
  # Consequence: verifier selection is cost-sensitive at runtime. If a
  # new model enters the pool at a lower price, the rules may start
  # preferring it over the listed pairing. The metrics log records the
  # exact verifier used for every call (router-metrics.jsonl), so the
  # audit trail remains complete. New models should be added with
  # is_enabled_as_verifier: false until their reliability is
  # demonstrated against real generation work.
  #
  # The legacy key name cross_provider_map is still accepted by
  # verification.py for backward compatibility with older branches.
  preferred_pairings:
    # Anthropic ↔ Google
    sonnet: gemini-pro
    # Google → OpenAI (distributes verifier load across all three providers)
    gemini-flash: gpt-5-4-mini
    gemini-pro: gpt-5-4-mini
    # Anthropic Opus (expensive) → OpenAI frontier (rules-engine also
    # lands here on cost; preference just documents the intent)
    opus: gpt-5-4
    # OpenAI → Anthropic (closes the triangle)
    gpt-5-4-mini: sonnet
    gpt-5-4: opus

  # Which task types are auto-verified when using route().
  # If a task type is listed here, route() automatically calls verify()
  # after getting the initial response. No extra code needed.
  auto_verify_task_types:
    - code-review
    - security-review
    - architecture
    - uat-plan-generation
    - uat-coverage-review
    - documentation           # Sonnet verifies Gemini's doc output (uses weekly Sonnet credits)
    # - test-generation       # uncomment to auto-verify test generation
    # - analysis              # uncomment to auto-verify general analysis

  # Verification behavior
  settings:
    # What the verifier checks for
    check_categories:
      - correctness            # factual and logical errors
      - completeness           # missing items the original should have caught
      - false_positives        # issues flagged by the original that aren't real

    # If the verifier finds issues, what happens?
    # Global default — applies to any task type NOT listed in
    # on_disagreement_by_task_type below.
    on_disagreement: merge     # "merge" | "flag" | "re-route"
                                # merge:    combine original + verifier feedback into final output
                                # flag:     return both responses, let Claude Code decide
                                # re-route: send to a Tier 3 model as tiebreaker

    # Per-task-type override of on_disagreement.
    # Merge is sound for task types where generator and verifier outputs
    # combine naturally (code review: "here are the bugs — here are the
    # ones the verifier would add"). Merge is NOT sound for task types
    # where a disagreement signals a logic divergence — synthesizing
    # two different architectural recommendations into one produces a
    # hallucinated compromise. For those, flag instead and force the
    # orchestrator to adjudicate under the Step 7 human-decision
    # procedure.
    on_disagreement_by_task_type:
      code-review:      merge
      security-review:  merge
      test-generation:  merge
      documentation:    merge
      formatting:       merge
      summarization:    merge
      analysis:         flag
      planning:         flag
      architecture:     flag
      refactoring:      flag

    # Tier 3 tiebreaker model (used when on_disagreement = "re-route")
    tiebreaker_model: opus

    # Maximum cost multiplier for verification.
    # If verification would cost more than this multiplier × original cost,
    # skip verification for this call.
    max_cost_multiplier: 3.0

    # Verification prompt template
    prompt_template_file: prompt-templates/verification.md

# --- Pull-verifier executor (Set 067) ---
# Config for the route()-PARALLEL agentic seam in ai_router/pull_verifier.py
# (pull_route). This is NOT a single-shot routed model: the verifier drives a
# multi-turn read-only tool loop and the orchestrator answers tool calls with
# raw ground truth. Distinct from the routing table above on purpose - it owns
# its own per-provider model pins, the shared per-run caps, and the per-provider
# generation knobs. The providers: block above is shared (api_key_env /
# base_url / timeout_seconds); only the call path differs.
pull_verifier:
  # Per-provider model pin. Resolved by pull_verifier._resolve_model when the
  # caller does not pass model=...; falls back to _DEFAULT_MODELS if absent.
  models:
    anthropic: claude-sonnet-4-6
    openai: gpt-5.4
    google: gemini-2.5-pro
  # Shared per-run bounds (PullCaps). The loop stops at the first ceiling.
  # max_output_tokens is deliberately generous: GPT-5.4 reasoning consumes the
  # output budget, and a too-small ceiling yields empty content (the observed
  # 9000-is-empty / 24000-is-fine failure mode), so 24000 keeps reasoning +
  # the tool call + the verdict inside one call across all three providers.
  caps:
    max_turns: 14
    max_output_tokens: 24000
    token_budget: 300000
    cost_ceiling_usd: 1.00
  # Per-provider reasoning knobs (same vocabulary as providers.py /
  # generation_params). Bounded for Gemini per L-064-1 (no -1 dynamic budget in
  # a headless loop); medium reasoning for the frontier models keeps the
  # path-aware critique careful without runaway spend.
  generation_params:
    anthropic:
      effort: medium
      thinking:
        enabled: true
        type: adaptive
    openai:
      reasoning_effort: medium
    google:
      thinking_budget: 8192
  # Set 068: the run_test execution cage (run_test_sandbox.RunTestCaps). run_test
  # is OFFERED to the loop only when a RunTestConfig is built and passed to
  # pull_route(); these are the cage's per-run bounds. The command surface itself
  # is bounded by the operator-supplied RunTestConfig (a fixed argv / named map),
  # NOT by this file - the model can never author a shell string. run_test is a
  # bounded verification cage, not a CI runner (spec non-goal).
  run_test:
    caps:
      wall_seconds: 120        # hard wall-clock; the process tree is killed on overrun
      output_byte_cap: 60000   # per-stream byte cap; over-cap output elided to a raw head slice
  # Set 069 S4: the Podman model-authored-probe cage (podman_sandbox.PodmanCaps).
  # The run_authored_probe lane is OFFERED to the loop only when a
  # PodmanLaneConfig is built and passed to pull_route() AND a green Podman spike
  # + a built image exist; these are the cage's per-probe bounds. wall_seconds is
  # the LOAD-BEARING bound on a rootless-cgroups-v1 host, where --memory/
  # --pids-limit/--cpus are ignored (spike finding 1) - it is kept conservative
  # because the timeout teardown path is ~10s in rootless WSL (spike finding 2).
  # enforce_resource_caps is omitted -> auto-detect the cgroup version (emit the
  # resource caps only on cgroup v2, where they are honored); pin it true/false to
  # override. The container is the security boundary, not these caps.
  podman:
    caps:
      wall_seconds: 30         # hard wall-clock; the timed-out container is force-removed by name
      output_byte_cap: 60000   # per-stream byte cap (stdout=probe output, stderr=runtime diagnostics)
      memory: 512m             # cgroup-v2 only (ignored on rootless cgroups-v1)
      pids_limit: 256          # cgroup-v2 only
      cpus: "2"                # cgroup-v2 only
  # Set 072: the verification-only application mode (verification_only_app.py).
  # COMMENTARY ONLY -- there is NO behavioral knob here and NOTHING reads this
  # block; it documents the shipped best-guess defaults so an operator sees them
  # in one place. The mode reuses the pull_verifier caps / models / generation
  # params above (each cell is a matrix-mode run_dual_surface call, which resolves
  # its arms through the same executor block). Shipped best-guess matrix defaults:
  #   - BOTH arms run strong adversarial framing (L-069-2 -- the matrix varies
  #     PROVIDER, never framing; the framing gate stays on both arms).
  #   - pull = a RELIABLE default (GPT-5.4); push = Anthropic or GPT.
  #   - the first external run includes a Gemini-on-pull-under-strong-framing cell
  #     (the load-bearing datapoint: is "Gemini-quiet-on-pull" a fixed framing
  #     artifact now that both templates are strong adversarial?).
  # The LIVE default pull provider in this file is UNCHANGED: the Gemini-pull cell
  # is an experiment cell, not a default change -- that decision belongs to a later
  # set on accumulated telemetry (spec non-goal). Cells are passed per-run on the
  # CLI (`--cell push:anthropic --cell pull:google`), not configured here.

# --- Contract-test / CDC gate (Set 068 S5) ---
# The deterministic verification FLOOR: a per-set, opt-in contractGate
# (none|advisory|required) whose close-out gate confirms a set's contract /
# falsifier tests ran and PASSED in the run_test cage above and cover every
# probeable defect class, reserving the path-aware critique agent for the
# non-probeable residual (Experiment A H4: ~95% of seeded defects are probeable).
# There is NO behavioral flag to flip here - the gate is declared per-set
# (contract-manifest.json) and produced via `python -m ai_router.contract_gate
# run`; the floor's execution bounds are the pull_verifier.run_test.caps block
# above (the gate's producer drives the same cage). This gate is the replacement
# floor the Set 068 S4 routed-demotion transition guard waited on; S6 wired the
# blast-radius gating predicate (routed_gate.py) that flipped per-session routed
# verification to gated (cut-over now LIVE -- see the verification: anchor). Doc:
# docs/contract-gate.md; design:
# docs/session-sets/068-cadence-study-and-contract-gate/contract-gate-design.md.

# --- Metrics ---
# Controls the append-only metrics log read by report.py (Session 4).
# Disable if you want to stop collecting. Retention note: log is
# append-only JSON lines; rotate manually when it gets large.
metrics:
  enabled: true
  log_filename: router-metrics.jsonl

# --- State Database ---
state:
  db_path: router-state.db       # relative to ai_router/
  log_prompts: false           # if true, stores full prompts (large!)
  log_responses: true          # store full responses for review

# --- Output ---
output:
  cost_report_on_exit: true    # print cost summary when session ends
  verbose: false               # detailed logging of each API call

# --- Guidance lifecycle (Set 064) ---
# Token ceilings for the always-loaded guidance files and the disuse
# window for the D5 archive trigger. The whole block is optional and
# fully defaulted (ai_router/guidance_config.py) — a repo with no block
# inherits these exact values. Ceilings are a HARD BACKSTOP, not the
# archive trigger: over ceiling means a pruning sweep is required before
# adding new content, but the sweep archives by the evidence rules
# (superseded / encoded-in-automation / subsystem-retired / disused-AND-
# unreferenced), never by raw length. Tokens are the ceil(chars/4)
# proxy the reporter prints, not a billing number.
guidance:
  active_lessons_ceiling_tokens: 10000   # docs/planning/lessons-learned.md (~40 KB)
  project_guidance_ceiling_tokens: 6000  # docs/planning/project-guidance.md (~24 KB)
  disuse_window_sets: 20                  # D5: archive after N sets unused AND unreferenced

  # --- Preload manifest + ratcheting ceiling gate (Set 085 F1) ---
  # Every file the session-start workflow requires in context, each with
  # a per-file token ceiling, plus a combined total_ceiling_tokens. The
  # gate is the anti-rebloat mechanism: `guidance_report --check` (run in
  # CI) fails the build on any per-file OR total breach, so at ceiling,
  # adding prose requires removing prose -- token-neutral by construction.
  #
  # Ceilings RATCHET DOWN ONLY. Raising any ceiling (or the total) is an
  # operator-authorized config edit with a stated reason, never an
  # in-session accommodation (docs/guidance-lifecycle.md).
  #
  # These ceilings are the "preload residency" budget and are DISTINCT
  # from the two Set-064 lifecycle ceilings above (which remain the
  # lessons/guidance pruning backstop that summarize_overhead and
  # --write-headers use). A repo with no `preload:` block keeps exactly
  # the two-file Set-064 behavior (universal core, gated extension).
  #
  # `stamp: true` opts a file in to --write-headers auto-editing; the
  # default (false) means canonical docs and the engine bootstrap files
  # are never machine-stamped. Ratchet start: nothing opts in.
  #
  # Set 085 S2 (the slimming): the manifest bounds the per-session
  # preload defined by the required-reading contract —
  # docs/session-constitution.md (the per-session operating doc, capped
  # at its declared 4000-token budget), the two guidance-lifecycle
  # files at their measured sizes, and ONE engine bootstrap file. A
  # session reads exactly one of CLAUDE.md / AGENTS.md / GEMINI.md, so
  # the manifest (a sum-based gate) counts the LARGEST of the three as
  # the representative entry — the total then bounds every engine's
  # session. The three engine files share one body by policy and are
  # kept in lockstep; an edit that makes an uncounted sibling the
  # largest must repoint this entry in the same change (review-time
  # discipline; see docs/guidance-lifecycle.md).
  # The demoted on-demand references (ai-led-session-workflow.md,
  # session-state-schema.md, close-out.md, the authoring guide,
  # quick-start.md) left the manifest deliberately UNCAPPED, like the
  # archive: their size is no longer a recurring per-session tax
  # (docs/guidance-lifecycle.md -> "Membership follows the
  # required-reading contract").
  preload:
    total_ceiling_tokens: 12000
    files:
      - path: docs/session-constitution.md
        ceiling_tokens: 4000
      - path: docs/planning/project-guidance.md
        ceiling_tokens: 3499
      - path: docs/planning/lessons-learned.md
        ceiling_tokens: 2385
      - path: AGENTS.md   # largest engine bootstrap file (representative)
        ceiling_tokens: 2031
